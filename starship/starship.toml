palette = "BloodTear"

[palettes.BloodTear]
PRIM  = '#5E81AC'
SEC   = '#FFFFFF'
GRAD0 = '#88C0D0'
GRAD1 = '#81A1C1'
GRAD2 = '#5E81AC'
GRAD3 = '#4C6A8A'
GRAD4 = '#3B5068'
CHEVBL= '#009DD9'
CHEVRD= 'E21836'

# OS module
[os]
disabled = false
symbols = { Windows = "Óė™ ", Debian = "ÓĮÖ ", Arch = "ůį£á "}
style = "fg:#FFFFFF bg:#5E81AC"
format = "$symbol"

# Username module ‚Äď corrigido: style_user e style_root
[username]
show_always = true
format = "$user"
style_user = "fg:#FFFFFF bg:#5E81AC"
style_root = "fg:#FFFFFF bg:#5E81AC"

# Fill module
[fill]
symbol = "‚ĒÄ"
style = "bold #5E81AC"

# Directory module
[directory]
format = "$path"
truncation_length = 3
truncation_symbol = "‚Ä¶/"
style = "fg:#FFFFFF bg:#5E81AC"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

# Git branch
[git_branch]
symbol = "Óú• "
format = "[ $symbol$branch ](fg:#FFFFFF bg:#5E81AC)"

# Time
[time]
use_12hr = true
disabled = false
time_format = "%I:%M %p"
format = '[$time]($style)'
style = "fg:#FFFFFF bg:#5E81AC"

# Command duration
[cmd_duration]
show_milliseconds = true
min_time = 0
format = "[$duration]($style)"
style = "fg:#FFFFFF bg:#5E81AC"

# Character
[character]
success_symbol = "[ ‚ĚĪ](bold fg:#009DD9)"
error_symbol = "[ ‚ĚĪ](bold fg:#E21836)"

